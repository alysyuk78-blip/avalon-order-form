  <style>
    * { font-family: 'Inter', 'Segoe UI', sans-serif !important; box-sizing: border-box; }
    body { margin: 0; background-color: #f5f0e8; }
    .dim-card { transition: box-shadow 0.3s ease, transform 0.2s ease; }
    @media (hover: hover) { .dim-card:hover { box-shadow: 0 8px 32px rgba(201,168,76,0.18); transform: translateY(-2px); } }
    .color-btn { transition: transform 0.15s ease, box-shadow 0.2s ease; -webkit-tap-highlight-color: transparent; }
    @media (hover: hover) { .color-btn:hover { transform: scale(1.06); } }
    .color-btn:active { transform: scale(0.97); box-shadow: 0 0 0 3px rgba(201,168,76,0.4) !important; }
    .submit-btn { transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease; -webkit-tap-highlight-color: transparent; }
    @media (hover: hover) { .submit-btn:hover:not(:disabled) { background: #15372A !important; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(27,67,50,0.35); } }
    .submit-btn:active:not(:disabled) { transform: scale(0.98); box-shadow: 0 2px 8px rgba(27,67,50,0.3); }
    .gold-divider { background: linear-gradient(90deg, transparent, #C9A84C, transparent); }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeInUp 0.55s ease both; }
    .header-glow { background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 70%); }
    .call-btn { transition: all 0.2s ease; border: 1.5px solid #C9A84C; color: #C9A84C; background: transparent; border-radius: 10px; padding: 10px 22px; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; letter-spacing: 0.04em; -webkit-tap-highlight-color: transparent; text-decoration: none; }
    @media (hover: hover) { .call-btn:hover { background: #C9A84C; color: #1B4332; box-shadow: 0 4px 16px rgba(201,168,76,0.3); transform: translateY(-1px); } }
    .call-btn:active { background: #C9A84C; color: #1B4332; transform: scale(0.97); }
    @keyframes phoneShake { 0%,100%{transform:rotate(0deg)} 15%{transform:rotate(-15deg)} 30%{transform:rotate(12deg)} 45%{transform:rotate(-10deg)} 60%{transform:rotate(8deg)} 75%{transform:rotate(-5deg)} 90%{transform:rotate(3deg)} }
    .phone-shake { animation: phoneShake 0.7s ease infinite; display: inline-block; }
    @keyframes submitPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(27,67,50,0.5), 0 4px 20px rgba(27,67,50,0.35); } 50% { box-shadow: 0 0 0 10px rgba(27,67,50,0), 0 4px 20px rgba(27,67,50,0.35); } }
    @keyframes submitShine { 0% { left: -100%; } 100% { left: 200%; } }
    @keyframes submitBounce { 0%, 100% { transform: translateY(0) scale(1); } 30% { transform: translateY(-4px) scale(1.04); } 60% { transform: translateY(-2px) scale(1.02); } }
    .submit-ready { position: relative; overflow: hidden; animation: submitPulse 2.2s ease-in-out infinite, submitBounce 3s ease-in-out infinite !important; }
    .submit-ready::before { content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%); animation: submitShine 2.5s ease-in-out infinite; pointer-events: none; }
    @media (hover: hover) { .submit-ready:hover:not(:disabled) { animation: none !important; transform: translateY(-2px) scale(1.04) !important; box-shadow: 0 8px 28px rgba(27,67,50,0.55) !important; } }
    .submit-ready:active:not(:disabled) { transform: scale(0.97) !important; animation: none !important; }
    .upload-zone { border: 2px dashed #C9A84C55; border-radius: 10px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.2s ease; background: #fdf8f0; }
    .upload-zone:hover { border-color: #C9A84C; background: #fdf3e0; }
    input[type="text"], input[type="number"], textarea, select { border-radius: 10px !important; border: 1.5px solid #e2e0dc !important; transition: border-color 0.2s ease, box-shadow 0.2s ease !important; box-sizing: border-box !important; max-width: 100% !important; }
    input[type="text"]:focus, input[type="number"]:focus, textarea:focus { border-color: #1B4332 !important; box-shadow: 0 0 0 3px rgba(27,67,50,0.08) !important; outline: none !important; }
    .tg-btn { transition: all 0.2s ease; border: 1.5px solid #229ED9; color: #229ED9; background: transparent; border-radius: 10px; padding: 10px 22px; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; letter-spacing: 0.04em; text-decoration: none; }
    .tg-btn:hover { background: #229ED9; color: #fff; box-shadow: 0 4px 16px rgba(34,158,217,0.3); transform: translateY(-1px); }
    @keyframes tgShake { 0%,100%{transform:rotate(0deg)} 15%{transform:rotate(-15deg)} 30%{transform:rotate(12deg)} 45%{transform:rotate(-10deg)} 60%{transform:rotate(8deg)} 75%{transform:rotate(-5deg)} 90%{transform:rotate(3deg)} }
    .tg-shake { animation: tgShake 0.7s ease infinite; display: inline-block; }
    .field-error input, .field-error select, input.field-error, select.field-error { border-color: #ef4444 !important; background-color: #fff5f5 !important; }
    .select-wrap { position: relative; }
    .select-wrap select { appearance: none; width: 100%; padding: 8px 36px 8px 12px; font-size: 14px; background: #fff; cursor: pointer; }
    .select-wrap::after { content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #6B7280; font-size: 12px; }
    /* Calendar styles */
    .cal-overlay { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }
    .cal-modal { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); max-width: 340px; width: 90%; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-nav { background: none; border: 1.5px solid #e2e0dc; border-radius: 8px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #1B4332; }
    .cal-nav:hover { background: #f5f0e8; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
    .cal-day-label { font-size: 11px; font-weight: 600; color: #9CA3AF; padding: 4px; }
    .cal-day { font-size: 13px; padding: 8px 4px; border-radius: 8px; cursor: pointer; border: none; background: none; color: #1B4332; font-weight: 500; }
    .cal-day:hover:not(:disabled) { background: #f5f0e8; }
    .cal-day:disabled { color: #d1d5db; cursor: default; }
    .cal-day.selected { background: #1B4332; color: #fff; }
    .cal-day.today { border: 1.5px solid #C9A84C; }

    // ============================================================
    // PRICE CALCULATOR LOGIC
    // ============================================================
    const PRICE_PER_M2 = 2592;
    const COMPLEX_PATTERNS = ["K3", "K4", "K6", "K8", "K9"];

    function calcPrice({ construction_type, basket_type, quantity, size_w, size_h, size_d, pattern }) {
      const w = Number(size_w) || 0;
      const h = Number(size_h) || 0;
      const d = Number(size_d) || 0;
      const qty = Number(quantity) || 1;
      if (!w || !h || !qty) return null;
      const areaMm2 = w * h + 2 * d * h;
      const areaM2 = areaMm2 / 1_000_000;
      let pricePerM2 = PRICE_PER_M2;
      if (basket_type?.toLowerCase().includes("антивандал")) pricePerM2 *= 1.35;
      if (construction_type?.toLowerCase().includes("розбірний")) pricePerM2 *= 1.1;
      if (pattern && COMPLEX_PATTERNS.includes(pattern)) pricePerM2 *= 1.15;
      const perUnit = Math.round(areaM2 * pricePerM2 * 100) / 100;
      const total = Math.round(perUnit * qty * 100) / 100;
      const prepayment = Math.round(total * 0.5 * 100) / 100;
      return { total, prepayment, perUnit, areaM2: Math.round(areaM2 * 1000) / 1000 };
    }

    function fmt(n) {
      return n.toLocaleString("uk-UA", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // ============================================================
    // WORKING DAYS / DELIVERY DATE
    // ============================================================
    function addWorkingDays(startDate, days) {
      // startDate is day 1 (inclusive), count total of `days` working days
      let date = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
      let counted = 1; // startDate itself is day 1
      while (counted < days) {
        date.setDate(date.getDate() + 1);
        const dow = date.getDay();
        if (dow !== 0 && dow !== 6) counted++;
      }
      return date;
    }

    function getMinDeliveryDate() {
      const now = new Date();
      // До 12:30 — відлік з сьогодні, після 12:30 — з завтра
      const cutoff = now.getHours() < 12 || (now.getHours() === 12 && now.getMinutes() < 30);
      let startDay = cutoff ? now : new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
      // Якщо стартовий день — вихідний, зсуваємо на понеділок
      while (startDay.getDay() === 0 || startDay.getDay() === 6) {
        startDay = new Date(startDay.getFullYear(), startDay.getMonth(), startDay.getDate() + 1);
      }
      return addWorkingDays(startDay, 5);
    }

    function FormCard({ title, children }) {
      return (
        <div className="bg-white rounded-2xl overflow-hidden dim-card" style={{ boxShadow: "0 2px 12px rgba(27,67,50,0.08)" }}>
          <div className="px-5 py-3 border-b flex items-center gap-2" style={{ backgroundColor: "#1B4332", borderColor: "#C9A84C30" }}>
            <div className="w-1 h-4 rounded-full" style={{ backgroundColor: "#C9A84C" }} />
            <h3 className="text-xs font-bold uppercase tracking-widest" style={{ color: "#C9A84C" }}>{title}</h3>
          </div>
          <div className="p-5 space-y-4">{children}</div>
        </div>
      );
    }

    function Field({ label, children }) {
      return (
        <div>
          <label className="text-xs font-semibold mb-1.5 block uppercase tracking-wider" style={{ color: "#1B4332" }}>{label}</label>
          {children}
        </div>
      );
    }

    function StyledInput({ className = "", error = false, ...props }) {
      return (
        <input
          className={`w-full rounded-lg border px-3 py-2 text-sm focus:outline-none transition-all ${error ? "field-error" : ""} ${className}`}
          style={{ borderColor: error ? "#ef4444" : "#d1d5db", backgroundColor: error ? "#fff5f5" : undefined }}
          {...props}
        />
      );
    }

    function StyledSelect({ value, onChange, placeholder, error, children }) {
      const [open, setOpen] = useState(false);
      const [pos, setPos] = useState({ top: 0, left: 0, width: 0 });
      const btnRef = useRef(null);
      const dropRef = useRef(null);
      const options = React.Children.toArray(children).map(c => ({ value: c.props.value, label: c.props.children }));
      const selected = options.find(o => o.value === value);

      useEffect(() => {
        const handler = (e) => {
          if (btnRef.current && !btnRef.current.contains(e.target) && dropRef.current && !dropRef.current.contains(e.target)) setOpen(false);
        };
        document.addEventListener("mousedown", handler);
        return () => document.removeEventListener("mousedown", handler);
      }, []);

      const handleOpen = () => {
        if (!open && btnRef.current) {
          const rect = btnRef.current.getBoundingClientRect();
          setPos({ top: rect.bottom + 4, left: rect.left, width: rect.width });
        }
        setOpen(!open);
      };

      return (
        <div>
          <button ref={btnRef} type="button" onClick={handleOpen}
            className={`w-full flex items-center justify-between rounded-lg border px-3 py-2 text-sm text-left transition-all ${error ? "field-error" : ""}`}
            style={{
              borderColor: error ? "#ef4444" : open ? "#1B4332" : "#d1d5db",
              backgroundColor: error ? "#fff5f5" : "#fff",
              boxShadow: open ? "0 0 0 3px rgba(27,67,50,0.08)" : "none",
              borderRadius: 10, minHeight: 38
            }}>
            <span style={{ color: selected ? "#111" : "#9CA3AF" }}>{selected ? selected.label : (placeholder || "Оберіть...")}</span>
            <IconChevronDown style={{ color: "#6B7280", transition: "transform 0.2s", transform: open ? "rotate(180deg)" : "rotate(0)", flexShrink: 0 }} />
          </button>
          {open && ReactDOM.createPortal(
            <div ref={dropRef} style={{
              position: "fixed", top: pos.top, left: pos.left, width: pos.width, zIndex: 9999,
              background: "#fff", border: "1.5px solid #e2e0dc", borderRadius: 10,
              boxShadow: "0 8px 24px rgba(0,0,0,0.12)", maxHeight: 220, overflowY: "auto"
            }}>
              {options.map(o => (
                <div key={o.value}
                  onClick={() => { onChange(o.value); setOpen(false); }}
                  className="cursor-pointer transition-colors"
                  style={{
                    padding: "10px 14px", fontSize: 14,
                    backgroundColor: o.value === value ? "#f5f0e8" : "transparent",
                    color: o.value === value ? "#1B4332" : "#374151",
                    fontWeight: o.value === value ? 600 : 400
                  }}
                  onMouseEnter={e => { if (o.value !== value) e.currentTarget.style.backgroundColor = "#fdf8f0"; }}
                  onMouseLeave={e => { if (o.value !== value) e.currentTarget.style.backgroundColor = "transparent"; }}>
                  {o.value === value && <span style={{ marginRight: 8, color: "#1B4332" }}>✓</span>}
                  {o.label}
                </div>
              ))}
            </div>,
            document.body
          )}
        </div>
      );
    }

    function Toast({ message, type, onClose }) {
      useEffect(() => {
        const t = setTimeout(onClose, 4000);
        return () => clearTimeout(t);
      }, []);
      const bg = type === "error" ? "#ef4444" : "#1B4332";
      return (
        <div style={{
          position: "fixed", top: 20, right: 20, zIndex: 1000, background: bg,
          color: "#fff", padding: "12px 24px", borderRadius: 12, fontSize: 14,
          fontWeight: 600, boxShadow: "0 8px 32px rgba(0,0,0,0.2)",
          animation: "fadeInUp 0.3s ease"
        }}>
          {message}
        </div>
      );
    }

    function CalendarPicker({ selected, onSelect, minDate, onClose }) {
      const [viewDate, setViewDate] = useState(() => selected ? new Date(selected) : new Date(minDate));
      const DAYS_UK = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Нд"];
      const MONTHS_UK = ["Січень","Лютий","Березень","Квітень","Травень","Червень","Липень","Серпень","Вересень","Жовтень","Листопад","Грудень"];
      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const firstDay = new Date(year, month, 1);
      let startDow = firstDay.getDay() - 1;
      if (startDow < 0) startDow = 6;
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();
      today.setHours(0,0,0,0);

      const cells = [];
      for (let i = 0; i < startDow; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(d);

      const prev = () => setViewDate(new Date(year, month - 1, 1));
      const next = () => setViewDate(new Date(year, month + 1, 1));

      return (
        <div className="cal-overlay" onClick={onClose}>
          <div className="cal-modal" onClick={e => e.stopPropagation()}>
            <div className="cal-header">
              <button type="button" className="cal-nav" onClick={prev}>‹</button>
              <span style={{ fontWeight: 700, color: "#1B4332", fontSize: 15 }}>{MONTHS_UK[month]} {year}</span>
              <button type="button" className="cal-nav" onClick={next}>›</button>
            </div>
            <div className="cal-grid">
              {DAYS_UK.map(d => <div key={d} className="cal-day-label">{d}</div>)}
              {cells.map((day, i) => {
                if (!day) return <div key={`e${i}`} />;
                const date = new Date(year, month, day);
                date.setHours(0,0,0,0);
                const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                const disabled = date < minDate || isWeekend;
                const isToday = date.getTime() === today.getTime();
                const isSelected = selected && new Date(selected).toDateString() === date.toDateString();
                return (
                  <button key={day} type="button" disabled={disabled}
                    className={`cal-day ${isSelected ? "selected" : ""} ${isToday ? "today" : ""}`}
                    onClick={() => { onSelect(date); onClose(); }}>
                    {day}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // Generate order number: ORD-DDMMYY-XXX
    function generateOrderNumber() {
      const now = new Date();
      const dd = String(now.getDate()).padStart(2, "0");
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const yy = String(now.getFullYear()).slice(-2);
      const xxx = String(Math.floor(Math.random() * 900) + 100);
      return `ORD-${dd}${mm}${yy}-${xxx}`;
    }

    // Calculate price for TG message
    const PRODUCTION_PRICE_PER_M2 = 1920; // Виробнича ціна для Telegram/Sheets

    function calcPriceForMessage(order) {
      const w = Number(order.size_w) || 0;
      const h = Number(order.size_h) || 0;
      const d = Number(order.size_d) || 0;
      const qty = Number(order.quantity) || 1;
      if (!w || !h) return null;
      const areaMm2 = w * h + 2 * d * h;
      const areaM2 = areaMm2 / 1_000_000;
      let pricePerM2 = PRODUCTION_PRICE_PER_M2;
      if (order.basket_type?.toLowerCase().includes("антивандал")) pricePerM2 *= 1.35;
      if (order.construction_type?.toLowerCase().includes("розбірний")) pricePerM2 *= 1.1;
      if (order.pattern && COMPLEX_PATTERNS.includes(order.pattern)) pricePerM2 *= 1.15;
      const perUnit = Math.round(areaM2 * pricePerM2);
      const total = perUnit * qty;
      return { areaM2: areaM2.toFixed(2), pricePerM2: Math.round(pricePerM2), total, perUnit };
    }

    function formatDeliveryDate(dateStr) {
      if (!dateStr) return "—";
      const d = new Date(dateStr);
      return d.toLocaleDateString("uk-UA", { day: "2-digit", month: "2-digit", year: "numeric" });
    }

    function formatNow() {
      const now = new Date();
      const days = ["Нд", "Пн", "Вт", "Ср", "Чт", "Пт", "Сб"];
      const dd = String(now.getDate()).padStart(2, "0");
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const yyyy = now.getFullYear();
      const hh = String(now.getHours()).padStart(2, "0");
      const min = String(now.getMinutes()).padStart(2, "0");
      return `${days[now.getDay()]} ${dd}.${mm}.${yyyy}, ${hh}:${min}`;
    }

    async function submitOrder(order, patternFile) {
      // Generate order number
      const orderNumber = generateOrderNumber();
      const orderWithNumber = { ...order, order_number: orderNumber };

      // Try serverless function first
      if (CONFIG.API_URL) {
        const formData = new FormData();
        formData.append("order", JSON.stringify(orderWithNumber));
        if (patternFile) formData.append("file", patternFile);
        const res = await fetch(CONFIG.API_URL, { method: "POST", body: formData });
        if (!res.ok) throw new Error("Server error: " + res.status);
        return await res.json();
      }

      const results = [];

      // Telegram
      if (CONFIG.TELEGRAM_BOT_TOKEN && CONFIG.TELEGRAM_CHAT_ID) {
        try {
          const text = formatTelegramMessage(orderWithNumber);
          const tgRes = await fetch(`https://api.telegram.org/bot${CONFIG.TELEGRAM_BOT_TOKEN}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ chat_id: CONFIG.TELEGRAM_CHAT_ID, text, parse_mode: "HTML" })
          });
          const tgData = await tgRes.json();
          if (!tgData.ok) console.error("Telegram error:", tgData);
          results.push(tgData.ok ? "tg:ok" : "tg:err");

          if (patternFile) {
            const fd = new FormData();
            fd.append("chat_id", CONFIG.TELEGRAM_CHAT_ID);
            fd.append("document", patternFile);
            fd.append("caption", `📎 Файл візерунку до ${orderNumber}: ${order.first_name} ${order.last_name}`);
            await fetch(`https://api.telegram.org/bot${CONFIG.TELEGRAM_BOT_TOKEN}/sendDocument`, { method: "POST", body: fd });
          }
        } catch (err) {
          console.error("Telegram send error:", err);
          results.push("tg:err");
        }
      }

      // Google Sheets
      if (CONFIG.GOOGLE_SHEET_URL) {
        try {
          await fetch(CONFIG.GOOGLE_SHEET_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ timestamp: new Date().toISOString(), ...orderWithNumber })
          });
          results.push("gs:ok");
        } catch (err) {
          console.error("Google Sheets error:", err);
          results.push("gs:err");
        }
      }

      // Trello
      if (CONFIG.TRELLO_API_KEY && CONFIG.TRELLO_TOKEN && CONFIG.TRELLO_LIST_ID) {
        try {
          const price = calcPriceForMessage(order);
          const name = `${orderNumber} — ${order.first_name} ${order.last_name} — ${order.quantity} шт.`;
          const desc = formatTrelloDescription(orderWithNumber, price);
          await fetch(`https://api.trello.com/1/cards?key=${CONFIG.TRELLO_API_KEY}&token=${CONFIG.TRELLO_TOKEN}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ idList: CONFIG.TRELLO_LIST_ID, name, desc })
          });
          results.push("trello:ok");
        } catch (err) {
          console.error("Trello error:", err);
          results.push("trello:err");
        }
      }

      if (results.includes("tg:ok")) return { ok: true };
      if (results.length === 0) throw new Error("No integrations configured");
      if (results.includes("gs:ok") || results.includes("trello:ok")) return { ok: true };
      throw new Error("Send failed: " + results.join(", "));
    }

    function escHtml(s) {
      return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function formatTelegramMessage(order) {
      const e = (v) => escHtml(v);
      const price = calcPriceForMessage(order);
      const basketType = order.basket_type?.includes("Антивандальний") ? "Антивандальний" : order.basket_type;

      let msg = `📌 <b>Замовлення №${order.order_number}</b>\n`;
      msg += `🕐 ${formatNow()}\n`;
      msg += `👤 ${e(order.first_name)} ${e(order.last_name)}\n`;
      msg += `📞 ${e(order.phone)}\n`;
      if (order.city) msg += `🏙 ${e(order.city)}\n`;
      msg += `\n`;
      msg += `• Тип: <b>${e(basketType)}</b>\n`;
      msg += `• Вид конструкції: <b>${e(order.construction_type)}</b>\n`;
      if (order.color) msg += `• Колір: <b>${e(order.color)}${order.color_custom ? " (" + e(order.color_custom) + ")" : ""}</b>\n`;
      if (order.pattern) msg += `• Візерунок: <b>${e(order.pattern)}${order.pattern_custom ? " (" + e(order.pattern_custom) + ")" : ""}</b>\n`;
      msg += `• Розміри:\n`;
      msg += `   Висота — H: <b>${order.size_h}</b> мм\n`;
      msg += `   Ширина — W: <b>${order.size_w}</b> мм\n`;
      msg += `   Глибина — D: <b>${order.size_d}</b> мм\n`;
      msg += `• Кількість: <b>${order.quantity} шт.</b>\n`;
      if (price) {
        msg += `• Площа виробу: <b>${price.areaM2} м²</b>\n`;
        msg += `• Ціна за 1 м²: <b>${price.pricePerM2.toLocaleString("uk-UA")} ₴</b>\n`;
        msg += `• Вартість виробнича: <b>${price.total.toLocaleString("uk-UA")} ₴</b>\n`;
      }
      const transport = order.transport === "Інше" ? order.transport_custom : order.transport;
      if (transport) msg += `• Доставка: ${e(transport)}\n`;
      if (order.delivery_address) msg += `• Адреса: ${e(order.delivery_address)}\n`;
      if (order.delivery_date) msg += `• Дата доставки: <b>${formatDeliveryDate(order.delivery_date)}</b>\n`;
      msg += `• Оплата: <i>${e(order.payment_method)}</i>\n`;
      if (order.how_found) msg += `• Як дізнались: ${e(order.how_found)}${order.how_found === "Інше" ? " (" + e(order.how_found_custom) + ")" : ""}\n`;
      if (order.notes) msg += `• Дод. інформація: <b>${e(order.notes)}</b>\n`;
      return msg;
    }

    function formatTrelloDescription(order, price) {
      let d = `**Клієнт:** ${order.first_name} ${order.last_name}\n`;
      d += `**Телефон:** ${order.phone}\n`;
      if (order.city) d += `**Місто:** ${order.city}\n\n`;
      d += `**Тип:** ${order.basket_type}\n`;
      d += `**Конструкція:** ${order.construction_type}\n`;
      d += `**Колір:** ${order.color}${order.color_custom ? " (" + order.color_custom + ")" : ""}\n`;
      d += `**Візерунок:** ${order.pattern}${order.pattern_custom ? " (" + order.pattern_custom + ")" : ""}\n`;
      d += `**Розміри:** W=${order.size_w}, H=${order.size_h}, D=${order.size_d} мм\n`;
      d += `**Кількість:** ${order.quantity} шт.\n`;
      if (price) d += `**Вартість:** ${price.total.toLocaleString("uk-UA")} ₴\n`;
      d += `\n**Доставка:** ${order.transport}${order.transport_custom ? " (" + order.transport_custom + ")" : ""}\n`;
      if (order.delivery_address) d += `**Адреса:** ${order.delivery_address}\n`;
      if (order.delivery_date) d += `**Дата доставки:** ${formatDeliveryDate(order.delivery_date)}\n`;
      d += `**Оплата:** ${order.payment_method}\n`;
      if (order.notes) d += `\n**Примітки:** ${order.notes}\n`;
      return d;
    }

    // ============================================================
    // MAIN FORM COMPONENT
    // ============================================================
    function OrderForm() {
      const [form, setForm] = useState({
        first_name: "", last_name: "", phone: "", city: "",
        construction_type: "", basket_type: "", quantity: "",
        color: "", color_custom: "", pattern: "", pattern_custom: "",
        size_w: "", size_h: "", size_d: "",
        transport: "", transport_custom: "", delivery_address: "",
        delivery_date: "", payment_method: "",
        terms_accepted: false, how_found: "", how_found_custom: "", notes: ""
      });
      const [submitting, setSubmitting] = useState(false);
      const [submitted, setSubmitted] = useState(false);
      const [patternFile, setPatternFile] = useState(null);
      const [showErrors, setShowErrors] = useState(false);
      const [toast, setToast] = useState(null);
      const [showCalendar, setShowCalendar] = useState(false);

      const set = (field, value) => setForm(f => ({ ...f, [field]: value }));

      const isFormValid =
        form.first_name.trim() &&
        form.phone.trim() &&
        form.construction_type &&
        form.basket_type &&
        Number(form.quantity) >= 1 &&
        Number(form.size_w) > 0 &&
        Number(form.size_h) > 0 &&
        Number(form.size_d) > 0 &&
        form.payment_method &&
        form.terms_accepted;

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!isFormValid) {
          setShowErrors(true);
          setToast({ message: "Заповніть всі обов'язкові поля, позначені *", type: "error" });
          const el = document.querySelector(".field-error");
          if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
          return;
        }
        setShowErrors(false);
        setSubmitting(true);
        const order = {
          ...form,
          first_name: form.first_name.trim(),
          last_name: form.last_name.trim(),
          phone: form.phone.trim(),
          city: form.city.trim(),
          quantity: Number(form.quantity) || 1,
          size_w: Number(form.size_w) || 0,
          size_h: Number(form.size_h) || 0,
          size_d: Number(form.size_d) || 0,
        };
        try {
          await submitOrder(order, patternFile);
          setSubmitted(true);
        } catch (err) {
          console.error(err);
          setToast({ message: "Помилка при відправці. Спробуйте ще раз або зателефонуйте нам.", type: "error" });
        }
        setSubmitting(false);
      };

      const resetForm = () => {
        setSubmitted(false);
        setPatternFile(null);
        setForm({
          first_name: "", last_name: "", phone: "", city: "",
          construction_type: "", basket_type: "", quantity: "",
          color: "", color_custom: "", pattern: "", pattern_custom: "",
          size_w: "", size_h: "", size_d: "",
          transport: "", transport_custom: "", delivery_address: "",
          delivery_date: "", payment_method: "",
          terms_accepted: false, how_found: "", how_found_custom: "", notes: ""
        });
      };

      // ---- SUCCESS SCREEN ----
      if (submitted) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4" style={{ backgroundColor: "#f5f0e8" }}>
            <div className="bg-white rounded-2xl shadow-xl p-10 max-w-md w-full text-center">
              <div className="flex justify-center mb-4">
                <div className="w-16 h-16 rounded-full flex items-center justify-center" style={{ backgroundColor: "#1B4332" }}>
                  <AvalonLogo size={40} />
                </div>
              </div>
              <h2 className="text-2xl font-bold mb-2" style={{ color: "#1B4332" }}>Дякуємо за замовлення!</h2>
              <p className="text-gray-600 mb-6">Ми зв'яжемось з вами найближчим часом для уточнення деталей та прорахунку вартості.</p>
              <button onClick={resetForm} className="text-white px-6 py-3 rounded-lg font-semibold" style={{ backgroundColor: "#1B4332" }}>
                Нове замовлення
              </button>
            </div>
          </div>
        );
      }

      const formatDate = (dateStr) => {
        if (!dateStr) return null;
        const d = new Date(dateStr);
        return d.toLocaleDateString("uk-UA", { day: "2-digit", month: "2-digit", year: "numeric" });
      };

      // ---- MAIN FORM ----
      return (
        <div className="min-h-screen" style={{ backgroundColor: "#f5f0e8" }}>
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
          {showCalendar && (
            <CalendarPicker
              selected={form.delivery_date ? new Date(form.delivery_date) : null}
              minDate={getMinDeliveryDate()}
              onSelect={date => {
                const y = date.getFullYear();
                const m = String(date.getMonth()+1).padStart(2,"0");
                const d = String(date.getDate()).padStart(2,"0");
                set("delivery_date", `${y}-${m}-${d}`);
              }}
              onClose={() => setShowCalendar(false)}
            />
          )}

          {/* Header */}
          <div className="py-12 px-4 text-center relative overflow-hidden header-glow" style={{ backgroundColor: "#1B4332" }}>
            <div className="flex justify-center mb-5 fade-in"><AvalonLogo size={120} /></div>
            <div className="gold-divider h-px w-32 mx-auto mb-6" />
            <h2 className="text-base md:text-lg font-semibold text-white uppercase tracking-widest mb-3 fade-in" style={{ animationDelay: "0.3s" }}>
              {SETTINGS.form_title}
            </h2>
            <p className="text-sm md:text-base max-w-xl mx-auto leading-relaxed italic fade-in" style={{ color: "#a8c5b0", animationDelay: "0.4s" }}>
              {SETTINGS.form_description}
            </p>
            <p className="text-xs mt-5 italic fade-in" style={{ color: "#C9A84C88", animationDelay: "0.5s" }}>* — обов'язкові поля</p>
          </div>

          {/* Form */}
          <div className="max-w-2xl mx-auto px-4 py-8 space-y-4">
            <form onSubmit={handleSubmit} className="space-y-4">

              {/* Контактні дані */}
              <FormCard title="Контактні дані">
                <Field label="Ім'я *">
                  <StyledInput placeholder="Ваше ім'я" value={form.first_name} onChange={e => set("first_name", e.target.value)} error={showErrors && !form.first_name.trim()} />
                </Field>
                <Field label="Прізвище">
                  <StyledInput placeholder="Ваше прізвище" value={form.last_name} onChange={e => set("last_name", e.target.value)} />
                </Field>
                <Field label="Номер телефону *">
                  <StyledInput placeholder="+380..." value={form.phone}
                    onChange={e => set("phone", e.target.value.replace(/[^\d+\s\-()]/g, ""))}
                    error={showErrors && !form.phone.trim()} />
                </Field>
                <Field label="Місто">
                  <StyledInput placeholder="Ваше місто" value={form.city} onChange={e => set("city", e.target.value)} />
                </Field>
              </FormCard>

              {/* Параметри кошика */}
              <FormCard title="Параметри кошика">
                <Field label="Вид конструкції *">
                  <StyledSelect value={form.construction_type} onChange={v => set("construction_type", v)} placeholder="Оберіть конструкцію" error={showErrors && !form.construction_type}>
                    {SETTINGS.construction_types.map(c => <option key={c} value={c}>{c}</option>)}
                  </StyledSelect>
                </Field>
                <Field label="Тип кошика *">
                  <StyledSelect value={form.basket_type} onChange={v => set("basket_type", v)} placeholder="Оберіть тип" error={showErrors && !form.basket_type}>
                    {SETTINGS.basket_types.map(b => <option key={b} value={b}>{b}</option>)}
                  </StyledSelect>
                </Field>
                <Field label="Кількість (шт.) *">
                  <StyledInput type="number" min={1} placeholder="Наприклад: 2" value={form.quantity}
                    onChange={e => set("quantity", e.target.value)} error={showErrors && !(Number(form.quantity) >= 1)} />
                </Field>
              </FormCard>

              {/* Колір */}
              <FormCard title="Колір (RAL)">
                <div className="grid grid-cols-3 sm:grid-cols-4 gap-3 mb-3">
                  {SETTINGS.colors.filter(c => c.hex).map(c => {
                    const hex = c.hex.toUpperCase();
                    const isLight = hex.startsWith("#F") || hex === "#9DA3A6" || hex === "#E55B13";
                    const selected = form.color === c.label;
                    return (
                      <button key={c.label} type="button" onClick={() => set("color", c.label)}
                        className="color-btn rounded-lg text-xs font-semibold flex items-center justify-center text-center px-1"
                        style={{
                          backgroundColor: c.hex, color: isLight ? "#111" : "#fff",
                          border: selected ? "1.5px solid #C9A84C" : `1px solid ${isLight ? "#ccc" : "rgba(255,255,255,0.18)"}`,
                          boxShadow: selected ? "0 0 0 2px rgba(201,168,76,0.4)" : "none",
                          height: "60px", lineHeight: "1.2"
                        }}>
                        {c.label}
                      </button>
                    );
                  })}
                  <button type="button" onClick={() => set("color", "Інші кольори")}
                    className="color-btn rounded-lg text-xs font-semibold bg-gray-100 flex items-center justify-center text-center px-1"
                    style={{
                      color: "#111",
                      border: form.color === "Інші кольори" ? "1.5px solid #C9A84C" : "1px solid #ccc",
                      boxShadow: form.color === "Інші кольори" ? "0 0 0 2px rgba(201,168,76,0.4)" : "none",
                      height: "60px"
                    }}>
                    Інші кольори
                  </button>
                </div>
                {(form.color === "Інші кольори" || form.color === "Інший") && (
                  <div className="mt-3 space-y-3 p-4 rounded-xl border" style={{ borderColor: "#C9A84C40", backgroundColor: "#fdf8f0" }}>
                    <div className="flex items-center gap-2 mb-2">
                      <span style={{ color: "#C9A84C" }}><IconPalette /></span>
                      <span className="text-xs font-semibold uppercase tracking-wider" style={{ color: "#1B4332" }}>Вкажіть колір або код RAL</span>
                    </div>
                    <StyledInput placeholder="Наприклад: RAL 3020, синій, бежевий..." value={form.color_custom} onChange={e => set("color_custom", e.target.value)} />
                    <p className="text-xs" style={{ color: "#9CA3AF" }}>Можна вказати назву, код RAL або опис кольору</p>
                  </div>
                )}
              </FormCard>

              {/* Візерунок */}
              <FormCard title="Візерунок">
                <p className="text-xs mb-3" style={{ color: "#6B7280" }}>K3, K4, K6, K8, K9 – дорожче через більшу кількість деталей</p>
                {SETTINGS.pattern_image_url && (
                  <img src={SETTINGS.pattern_image_url} alt="Візерунки" className="w-full rounded-lg mb-4 border" style={{ borderColor: "#C9A84C40" }} />
                )}
                <StyledSelect value={form.pattern} onChange={v => set("pattern", v)} placeholder="Оберіть візерунок">
                  {SETTINGS.patterns.map(p => <option key={p} value={p}>{p}</option>)}
                </StyledSelect>
                {form.pattern === "Інший" && (
                  <div className="mt-3 space-y-3 p-4 rounded-xl border" style={{ borderColor: "#C9A84C40", backgroundColor: "#fdf8f0" }}>
                    <StyledInput placeholder="Опишіть ваш візерунок..." value={form.pattern_custom} onChange={e => set("pattern_custom", e.target.value)} />
                    <div>
                      <p className="text-xs font-semibold uppercase tracking-wider mb-2" style={{ color: "#1B4332" }}>Завантажити файл або фото</p>
                      {patternFile ? (
                        <div className="flex items-center gap-3 p-3 rounded-lg border" style={{ borderColor: "#C9A84C60", backgroundColor: "#fff" }}>
                          <div className="flex-1 text-sm truncate" style={{ color: "#1B4332" }}>{patternFile.name}</div>
                          <button type="button" onClick={() => setPatternFile(null)} className="text-gray-400 hover:text-red-500 transition-colors">
                            <IconX />
                          </button>
                        </div>
                      ) : (
                        <label className="upload-zone block cursor-pointer">
                          <input type="file" className="hidden" accept="image/*,.pdf,.dxf,.dwg,.svg,.ai,.eps,.png,.jpg,.jpeg"
                            onChange={e => { if (e.target.files[0]) setPatternFile(e.target.files[0]); }} />
                          <span style={{ color: "#C9A84C" }}><IconUpload /></span>
                          <p className="text-xs font-medium mt-1" style={{ color: "#1B4332" }}>Натисніть або перетягніть файл</p>
                          <p className="text-xs mt-1" style={{ color: "#9CA3AF" }}>JPG, PNG, PDF, SVG, DXF, DWG, AI, EPS</p>
                        </label>
                      )}
                    </div>
                  </div>
                )}
              </FormCard>

              {/* Розміри */}
              <FormCard title="Розміри (мм) *">
                <p className="text-sm mb-4 italic" style={{ color: "#6B7280" }}>Вкажіть ширину (W), висоту (H) та глибину (D) відповідно до схем нижче</p>
                <div className="grid grid-cols-3 gap-3">
                  {[["size_w", "W — Ширина", 1], ["size_h", "H — Висота", 0], ["size_d", "D — Глибина", 2]].map(([field, label, idx]) => (
                    <div key={field} className="flex flex-col gap-2">
                      {SETTINGS.size_diagram_urls?.[idx] && (
                        <div className="rounded-lg overflow-hidden border bg-white" style={{ borderColor: "#e5e7eb" }}>
                          <img src={SETTINGS.size_diagram_urls[idx]} alt={label} className="w-full h-28 object-contain p-1" />
                        </div>
                      )}
                      <label className="text-xs font-semibold block" style={{ color: "#1B4332" }}>{label}</label>
                      <StyledInput type="number" placeholder="мм" value={form[field]}
                        onChange={e => set(field, e.target.value)} error={showErrors && !(Number(form[field]) > 0)} />
                    </div>
                  ))}
                </div>
              </FormCard>

              {/* Доставка */}
              <FormCard title="Доставка">
                <Field label="Транспортна компанія">
                  <StyledSelect value={form.transport} onChange={v => set("transport", v)} placeholder="Оберіть перевізника">
                    {SETTINGS.transport_options.map(t => <option key={t} value={t}>{t}</option>)}
                  </StyledSelect>
                </Field>
                {form.transport === "Інше" && (
                  <StyledInput className="mt-2" placeholder="Вкажіть перевізника" value={form.transport_custom} onChange={e => set("transport_custom", e.target.value)} />
                )}
                {form.transport === "Нова пошта" && (
                  <div className="space-y-3 mt-1">
                    <Field label="Місто">
                      <StyledInput placeholder="Наприклад: Київ, Львів, Одеса..." value={form.city} onChange={e => set("city", e.target.value)} />
                    </Field>
                    <Field label="Відділення / поштомат">
                      <StyledInput placeholder="Наприклад: Відділення №5 або Поштомат №123" value={form.delivery_address} onChange={e => set("delivery_address", e.target.value)} />
                    </Field>
                  </div>
                )}
                {form.transport === "Укрпошта" && (
                  <div className="space-y-3 mt-1">
                    <Field label="Місто">
                      <StyledInput placeholder="Наприклад: Київ, Львів, Одеса..." value={form.city} onChange={e => set("city", e.target.value)} />
                    </Field>
                    <Field label="Відділення / адреса">
                      <StyledInput placeholder="Номер відділення або повна адреса" value={form.delivery_address} onChange={e => set("delivery_address", e.target.value)} />
                    </Field>
                  </div>
                )}
                {form.transport === "Делівері" && (
                  <div className="space-y-3 mt-1">
                    <Field label="Місто">
                      <StyledInput placeholder="Наприклад: Київ, Львів, Одеса..." value={form.city} onChange={e => set("city", e.target.value)} />
                    </Field>
                    <Field label="Адреса доставки">
                      <StyledInput placeholder="Повна адреса або відділення Делівері" value={form.delivery_address} onChange={e => set("delivery_address", e.target.value)} />
                    </Field>
                  </div>
                )}
                {!form.transport && (
                  <Field label="Адреса доставки">
                    <StyledInput placeholder="Повна адреса доставки" value={form.delivery_address} onChange={e => set("delivery_address", e.target.value)} />
                  </Field>
                )}
                <Field label="Бажана дата доставки">
                  <p className="text-xs mb-1" style={{ color: "#9CA3AF" }}>Виготовлення 5 робочих днів з моменту оплати</p>
                  <button type="button" onClick={() => setShowCalendar(true)}
                    className="w-full flex items-center gap-2 px-3 py-2 rounded-lg border text-sm text-left"
                    style={{ borderColor: "#d1d5db", backgroundColor: "#fff", color: form.delivery_date ? "#111" : "#9CA3AF" }}>
                    <span style={{ color: "#1B4332", flexShrink: 0 }}><IconCalendar /></span>
                    {form.delivery_date ? formatDate(form.delivery_date) : "Оберіть дату"}
                  </button>
                </Field>
              </FormCard>

              {/* Оплата */}
              <FormCard title="Форма оплати *">
                <StyledSelect value={form.payment_method} onChange={v => set("payment_method", v)} placeholder="Оберіть форму оплати" error={showErrors && !form.payment_method}>
                  {SETTINGS.payment_methods.map(p => <option key={p} value={p}>{p}</option>)}
                </StyledSelect>
              </FormCard>

              {/* Умови */}
              <FormCard title="Умови замовлення">
                <TermsBlock />
                <div className={`flex items-center gap-3 mt-5 pt-4 border-t rounded-lg ${showErrors && !form.terms_accepted ? "p-2 -mx-2" : ""}`}
                  style={{ borderColor: "#e5e7eb", backgroundColor: showErrors && !form.terms_accepted ? "#fff5f5" : undefined }}>
                  <input type="checkbox" id="terms" checked={form.terms_accepted}
                    onChange={e => set("terms_accepted", e.target.checked)}
                    className="w-5 h-5 rounded accent-emerald-800 cursor-pointer"
                    style={{ accentColor: "#1B4332" }} />
                  <label htmlFor="terms" className="cursor-pointer text-sm font-medium" style={{ color: "#1B4332" }}>
                    З умовами ознайомлений(на) *
                  </label>
                </div>
              </FormCard>

              {/* Як дізнались */}
              <FormCard title="Звідки ви дізналися про нас?">
                <div className="space-y-2">
                  {SETTINGS.how_found_options.map(o => (
                    <label key={o} className="flex items-center gap-3 cursor-pointer">
                      <input type="radio" name="how_found" value={o} checked={form.how_found === o}
                        onChange={() => set("how_found", o)} className="w-4 h-4" style={{ accentColor: "#1B4332" }} />
                      <span className="text-sm">{o}</span>
                    </label>
                  ))}
                  <label className="flex items-center gap-3 cursor-pointer">
                    <input type="radio" name="how_found" value="Інше" checked={form.how_found === "Інше"}
                      onChange={() => set("how_found", "Інше")} className="w-4 h-4" style={{ accentColor: "#1B4332" }} />
                    <span className="text-sm">Інше</span>
                  </label>
                  {form.how_found === "Інше" && (
                    <StyledInput className="ml-7" placeholder="Ваш коментар..." value={form.how_found_custom}
                      onChange={e => set("how_found_custom", e.target.value)} />
                  )}
                </div>
              </FormCard>

              {/* Примітки */}
              <FormCard title="Додаткові примітки">
                <textarea placeholder="Будь-яка додаткова інформація..." value={form.notes}
                  onChange={e => set("notes", e.target.value)} rows={3}
                  className="rounded-lg border text-sm resize-none focus:outline-none w-full p-3"
                  style={{ borderColor: "#d1d5db" }} />
              </FormCard>

              {/* Price Calculator */}
              <PriceCalculator form={form} />

              {/* Submit */}
              <div className="flex flex-col sm:flex-row items-center justify-between gap-4 pt-2">
                <button type="submit" disabled={submitting || !isFormValid}
                  className={`submit-btn w-full sm:w-auto px-10 py-3 rounded-lg font-semibold text-white uppercase tracking-widest text-sm disabled:opacity-60${isFormValid ? " submit-ready" : ""}`}
                  style={{ backgroundColor: "#1B4332" }}>
                  {submitting ? "Надсилання..." : "Надіслати замовлення"}
                </button>
                {SETTINGS.phone_contact && (
                  <a href={`tel:${SETTINGS.phone_contact.replace(/\s/g, "")}`} className="call-btn">
                    <span className="phone-shake"><IconPhone /></span> {SETTINGS.phone_contact}
                  </a>
                )}
              </div>
            </form>

            {/* FAQ */}
            <FAQBlock />

            {/* Footer */}
            <div className="text-center pt-8 pb-6 space-y-1">
              <div className="gold-divider h-px w-32 mx-auto mb-6" />
              <div className="flex justify-center mb-3"><AvalonLogo size={48} /></div>
              <p className="text-xs text-gray-400 italic">avalonmetaldesign@gmail.com</p>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // RENDER
    // ============================================================
    ReactDOM.createRoot(document.getElementById("root")).render(<OrderForm />);
  </script>
</body>
</html>
